name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm exec jest --runInBand

      - name: Build
        run: pnpm build

      - name: Package extension
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/show-passwd-extension-${GITHUB_REF_NAME}.zip .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/show-passwd-extension-${{ github.ref_name }}.zip
          generate_release_notes: true
