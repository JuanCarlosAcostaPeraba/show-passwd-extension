<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Show Password Toggle</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell" aria-labelledby="popup-title">
      <section class="popup-header">
        <img class="popup-icon" src="assets/icon.svg" alt="" aria-hidden="true" />
        <div>
          <h1 id="popup-title">Show Password Toggle</h1>
          <p>Found something odd? Send a quick bug report.</p>
        </div>
      </section>

      <button id="report-issue" class="report-button" type="button">
        Report an issue
      </button>
    </main>

    <script type="module" src="ui/index.js"></script>
  </body>
</html>
